services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: safeflow-postgres
    environment:
      POSTGRES_DB: safeflow
      POSTGRES_USER: safeflow_user
      POSTGRES_PASSWORD: safeflow_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safeflow_user -d safeflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery + Caching
  redis:
    image: redis:7-alpine
    container_name: safeflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
